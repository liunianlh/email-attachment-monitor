<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}邮箱监控系统{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
      :root {
        --ink: #18202b;
        --muted: #6b7280;
        --line: #dde3ea;
        --paper: #ffffff;
        --field: #f7f9fc;
        --rail: #101823;
        --rail-active: #e8f0ff;
        --accent: #1f6feb;
      }

      body {
        background: #eef2f6;
        color: var(--ink);
      }

      .app-shell {
        min-height: 100vh;
        display: grid;
        grid-template-columns: 220px minmax(0, 1fr);
      }

      .sidebar {
        background: var(--rail);
        color: #fff;
        padding: 24px 18px;
      }

      .brand {
        font-size: 18px;
        font-weight: 700;
        margin-bottom: 28px;
      }

      .nav-link {
        border-radius: 8px;
        color: #b9c5d6;
        display: block;
        margin-bottom: 8px;
        padding: 10px 12px;
        text-decoration: none;
      }

      .nav-link:hover {
        color: #fff;
        background: rgba(255, 255, 255, .08);
      }

      .nav-link.active {
        background: var(--rail-active);
        color: #0f2544;
        font-weight: 700;
      }

      .content {
        padding: 32px;
      }

      .page-head {
        align-items: flex-end;
        display: flex;
        justify-content: space-between;
        margin-bottom: 20px;
      }

      .page-title {
        font-size: 28px;
        font-weight: 750;
        margin: 0;
      }

      .page-kicker {
        color: var(--muted);
        margin-top: 6px;
      }

      .panel {
        background: var(--paper);
        border: 1px solid var(--line);
        border-radius: 8px;
        padding: 20px;
      }

      .panel + .panel {
        margin-top: 16px;
      }

      .table {
        margin-bottom: 0;
      }

      .form-control,
      .form-select {
        background-color: var(--field);
      }

      textarea {
        font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      }

      .metric {
        background: #f8fafc;
        border: 1px solid var(--line);
        border-radius: 8px;
        padding: 16px;
      }

      .metric-label {
        color: var(--muted);
        font-size: 13px;
      }

      .metric-value {
        font-size: 22px;
        font-weight: 750;
      }
    </style>
  </head>
  <body>
    <div class="app-shell">
      <aside class="sidebar">
        <div class="brand">邮箱监控系统</div>
        <nav aria-label="主导航">
          <a class="nav-link {% if active_page == 'status' %}active{% endif %}" href="{{ url_for('status_page') }}">状态</a>
          <a class="nav-link {% if active_page == 'rules' %}active{% endif %}" href="{{ url_for('rules_page') }}">规则</a>
          <a class="nav-link {% if active_page == 'templates' %}active{% endif %}" href="{{ url_for('templates_page') }}">模板</a>
          <a class="nav-link {% if active_page == 'tasks' %}active{% endif %}" href="{{ url_for('tasks_page') }}">任务</a>
          <a class="nav-link {% if active_page == 'logs' %}active{% endif %}" href="{{ url_for('logs_page') }}">日志</a>
        </nav>
      </aside>
      <main class="content">
        {% with messages = get_flashed_messages(with_categories=true) %}
          {% for category, message in messages %}
            <div class="alert alert-{{ category }}">{{ message }}</div>
          {% endfor %}
        {% endwith %}
        {% block content %}{% endblock %}
      </main>
    </div>
  </body>
</html>
